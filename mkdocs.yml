site_name: tmux-tui
site_description: Mouse-driven drag-and-drop layout manager for tmux
site_url: https://lambdasistemi.github.io/tmux-tui/
repo_url: https://github.com/lambdasistemi/tmux-tui
repo_name: lambdasistemi/tmux-tui
edit_uri: ""

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Usage: usage.md
  - API Reference: api-reference.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true
