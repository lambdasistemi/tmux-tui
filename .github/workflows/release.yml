name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# release-please maintains the release PR (Cargo.toml + CHANGELOG) and, when it
# merges, cuts the `v<version>` tag. The tag push then triggers the Linux
# Release and Darwin Release workflows, which build the per-arch artifacts via
# the dev-assets lib and upload them to the GitHub release + Homebrew tap.
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: rust
